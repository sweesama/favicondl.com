# 一次性工作流：为旧博客文章补充 ja/ko/es 正文翻译
# 手动触发（workflow_dispatch），跑完自动 commit & push
# NVIDIA NIM 免费额度 40 RPM，可一次跑完所有文章
# 脚本会自动跳过已翻译的文章，所以重复跑也安全

name: Translate Old Blog Articles

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '每次翻译的文章数量上限（付费层可一次跑完）'
        required: false
        default: '50'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: blog/scripts
        run: npm install

      - name: Run translation script
        working-directory: blog/scripts
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: node translate-old-articles.js --limit ${{ github.event.inputs.limit }}

      - name: Install i18n dependencies
        working-directory: i18n
        run: npm install

      - name: Run i18n build
        working-directory: i18n
        run: node build.js

      - name: Commit & Push
        run: |
          git config user.name "Translate Bot"
          git config user.email "bot@favicondl.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "🌐 Translate old articles to ja/ko/es (batch)"
            git pull --rebase origin main
            git push
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Summary
        run: |
          echo "✅ Translation batch complete!"
          echo "If articles remain, run this workflow again tomorrow."
