# жҜҸж—ҘиҮӘеҠЁз”ҹжҲҗеҚҡе®ўж–Үз« 
# 
# е·ҘдҪңеҺҹзҗҶпјҡ
# 1. жҜҸеӨ© UTC 00:00пјҲеҢ—дә¬ж—¶й—ҙ 08:00пјүиҮӘеҠЁи§ҰеҸ‘
# 2. д»Һ queue.json еҸ–дёӢдёҖдёӘе…ій”®иҜҚ
# 3. и°ғз”Ё Gemini API з”ҹжҲҗ 5 иҜӯиЁҖж–Үз« пјҲen/zh/ja/ko/esпјү
# 4. з”ҹжҲҗ HTML + жӣҙж–° articles.json + sitemap.xml
# 5. иҝҗиЎҢ i18n build з”ҹжҲҗеӨҡиҜӯиЁҖйЎөйқў
# 6. иҮӘеҠЁ commit & push еҲ° main еҲҶж”Ҝ
#
# йңҖиҰҒеңЁ GitHub Repo вҶ’ Settings вҶ’ Secrets вҶ’ Actions дёӯж·»еҠ :
#   GEMINI_API_KEY = дҪ зҡ„ Google AI Studio API Key

name: Daily Blog Article Generator

on:
  schedule:
    # жҜҸеӨ© UTC 00:00 иҝҗиЎҢпјҲеҢ—дә¬ж—¶й—ҙ 08:00пјү
    - cron: '0 0 * * *'
  workflow_dispatch:
    # д№ҹж”ҜжҢҒжүӢеҠЁи§ҰеҸ‘пјҲж–№дҫҝжөӢиҜ•пјү

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: blog/scripts
        run: npm install

      - name: Check if there are pending keywords
        id: check-queue
        run: |
          PENDING=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
            const p = q.filter(i => i.status === 'pending').length;
            console.log(p);
          ")
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "рҹ“Ӣ Pending keywords: $PENDING"

      - name: Generate article
        if: steps.check-queue.outputs.pending != '0'
        working-directory: blog/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-article.js

      - name: Install i18n dependencies
        if: steps.check-queue.outputs.pending != '0'
        working-directory: i18n
        run: npm install

      - name: Build multi-language pages
        if: steps.check-queue.outputs.pending != '0'
        working-directory: i18n
        run: node build.js

      - name: Commit and push
        if: steps.check-queue.outputs.pending != '0'
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@favicondl.com"
          git add -A
          if ! git diff --staged --quiet; then
            SLUG=$(node -e "
              const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
              const done = q.filter(i => i.status === 'done');
              console.log(done[done.length-1]?.slug || 'new-article');
            ")
            git commit -m "рҹ“қ Auto-publish blog: $SLUG"
            git pull --rebase origin main
            git push
          else
            echo "в„№пёҸ No file changes detected, skipping commit."
          fi

      - name: Ping search engines
        if: steps.check-queue.outputs.pending != '0'
        run: |
          echo "рҹ”” йҖҡзҹҘжҗңзҙўеј•ж“Һ sitemap жӣҙж–°..."
          curl -s "https://www.google.com/ping?sitemap=https://favicondl.com/sitemap.xml" -o /dev/null -w "Google: HTTP %{http_code}\n"
          curl -s "https://www.bing.com/ping?sitemap=https://favicondl.com/sitemap.xml" -o /dev/null -w "Bing: HTTP %{http_code}\n"
          node blog/scripts/ping-indexnow.js
          echo "вң… жҗңзҙўеј•ж“Һе·ІйҖҡзҹҘ"

      - name: Send Feishu Notification
        if: steps.check-queue.outputs.pending != '0'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -n "$FEISHU_WEBHOOK" ]; then
            ARTICLE_INFO=$(node -e "
              const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
              const done = q.filter(i => i.status === 'done');
              const last = done[done.length-1] || {};
              const grade = last.qualityGrade || '?';
              const score = last.qualityScore || 0;
              const emoji = grade === 'A' ? 'рҹҸҶ' : grade === 'B' ? 'рҹ‘Қ' : 'вҡ пёҸ';
              console.log(JSON.stringify({ slug: last.slug || 'unknown', grade, score, emoji }));
            ")
            SLUG=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).slug)")
            GRADE=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).grade)")
            SCORE=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).score))")
            EMOJI=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).emoji)")
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"вң… Mzu favicondl жҜҸж—ҘеҚҡе®ўе·ІеҸ‘еёғпјҒ\n\n${EMOJI} иҙЁйҮҸиҜ„зә§пјҡ${GRADE}зә§ (${SCORE}/100)\nрҹ”— еүҚеҫҖжҹҘзңӢпјҡhttps://favicondl.com/blog/${SLUG}.html\nрҹҢҚ дә”еӣҪиҜӯиЁҖ(en/zh/ja/ko/es)е·ІдёҠзәҝ\nрҹ“Ў IndexNow/Sitemap е·ІйҖҡзҹҘ\"}}" \
                 $FEISHU_WEBHOOK
          else
            echo "в„№пёҸ FEISHU_WEBHOOK_URL secret not found, skipping notification."
          fi

      - name: Check keyword stock & alert
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          REMAINING=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
            console.log(q.filter(i => i.status === 'pending').length);
          ")
          echo "рҹ“Ұ еү©дҪҷеҫ…еҸ‘еёғе…ій”®иҜҚ: $REMAINING"
          if [ "$REMAINING" -le 5 ] && [ -n "$FEISHU_WEBHOOK" ]; then
            if [ "$REMAINING" -eq 0 ]; then
              MSG="рҹҡЁ Mzu favicondl е…ій”®иҜҚе·ІиҖ—е°ҪпјҒ\n\nрҹ“Ұ еү©дҪҷ: 0 зҜҮ\nвӣ” жҳҺеӨ©иө·е°Ҷж— ж–°ж–Үз« еҸ‘еёғ\n\nиҜ·е°Ҫеҝ«з”Ё SEO е·Ҙе…·и°ғз ”ж–°е…ій”®иҜҚпјҢиЎҘе……еҲ° blog/queue.json"
            else
              MSG="вҡ пёҸ Mzu favicondl е…ій”®иҜҚеә“еӯҳдёҚи¶іпјҒ\n\nрҹ“Ұ еү©дҪҷ: ${REMAINING} зҜҮ\nвҸі йў„и®Ў ${REMAINING} еӨ©еҗҺиҖ—е°Ҫ\n\nиҜ·жҸҗеүҚз”Ё SEO е·Ҙе…·и°ғз ”ж–°е…ій”®иҜҚпјҢиЎҘе……еҲ° blog/queue.json"
            fi
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}" \
                 $FEISHU_WEBHOOK
            echo "рҹ“ў дҪҺеә“еӯҳйў„иӯҰе·ІеҸ‘йҖҒеҲ°йЈһд№Ұ"
          fi

      - name: No articles to publish
        if: steps.check-queue.outputs.pending == '0'
        run: echo "вҸёпёҸ No pending keywords in queue. Add more to blog/queue.json"
