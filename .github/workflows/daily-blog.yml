# 每日自动生成博客文章
# 
# 工作原理：
# 1. 每天 UTC 00:00（北京时间 08:00）自动触发
# 2. 从 queue.json 取下一个关键词
# 3. 调用 NVIDIA NIM API 生成 5 语言文章（en/zh/ja/ko/es）
# 4. 生成 HTML + 更新 articles.json + sitemap.xml
# 5. 运行 i18n build 生成多语言页面
# 6. 自动 commit & push 到 main 分支
#
# 需要在 GitHub Repo → Settings → Secrets → Actions 中添加:
#   NVIDIA_API_KEY = 你的 NVIDIA NIM API Key（https://build.nvidia.com 免费获取）

name: Daily Blog Article Generator

on:
  schedule:
    # 每天 UTC 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 也支持手动触发（方便测试）

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: blog/scripts
        run: npm install

      - name: Check if there are pending keywords
        id: check-queue
        run: |
          PENDING=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
            const p = q.filter(i => i.status === 'pending').length;
            console.log(p);
          ")
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "📋 Pending keywords: $PENDING"

      - name: Generate article
        if: steps.check-queue.outputs.pending != '0'
        working-directory: blog/scripts
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: node generate-article.js

      - name: Install i18n dependencies
        if: steps.check-queue.outputs.pending != '0'
        working-directory: i18n
        run: npm install

      - name: Build multi-language pages
        if: steps.check-queue.outputs.pending != '0'
        working-directory: i18n
        run: node build.js

      - name: Commit and push
        if: steps.check-queue.outputs.pending != '0'
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@favicondl.com"
          git add -A
          if ! git diff --staged --quiet; then
            SLUG=$(node -e "
              const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
              const done = q.filter(i => i.status === 'done');
              console.log(done[done.length-1]?.slug || 'new-article');
            ")
            git commit -m "📝 Auto-publish blog: $SLUG"
            git pull --rebase origin main
            git push
          else
            echo "ℹ️ No file changes detected, skipping commit."
          fi

      - name: Ping search engines
        if: steps.check-queue.outputs.pending != '0'
        run: |
          echo "🔔 通知搜索引擎 sitemap 更新..."
          curl -s "https://www.google.com/ping?sitemap=https://favicondl.com/sitemap.xml" -o /dev/null -w "Google: HTTP %{http_code}\n"
          curl -s "https://www.bing.com/ping?sitemap=https://favicondl.com/sitemap.xml" -o /dev/null -w "Bing: HTTP %{http_code}\n"
          node blog/scripts/ping-indexnow.js
          echo "✅ 搜索引擎已通知"

      - name: Send Feishu Notification
        if: steps.check-queue.outputs.pending != '0'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -n "$FEISHU_WEBHOOK" ]; then
            ARTICLE_INFO=$(node -e "
              const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
              const done = q.filter(i => i.status === 'done');
              const last = done[done.length-1] || {};
              const grade = last.qualityGrade || '?';
              const score = last.qualityScore || 0;
              const emoji = grade === 'A' ? '🏆' : grade === 'B' ? '👍' : '⚠️';
              console.log(JSON.stringify({ slug: last.slug || 'unknown', grade, score, emoji }));
            ")
            SLUG=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).slug)")
            GRADE=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).grade)")
            SCORE=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).score))")
            EMOJI=$(echo "$ARTICLE_INFO" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).emoji)")
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"✅ Mzu favicondl 每日博客已发布！\n\n${EMOJI} 质量评级：${GRADE}级 (${SCORE}/100)\n🔗 前往查看：https://favicondl.com/blog/${SLUG}.html\n🌍 五国语言(en/zh/ja/ko/es)已上线\n📡 IndexNow/Sitemap 已通知\"}}" \
                 $FEISHU_WEBHOOK
          else
            echo "ℹ️ FEISHU_WEBHOOK_URL secret not found, skipping notification."
          fi

      - name: Check keyword stock & alert
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          REMAINING=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('blog/queue.json','utf-8'));
            console.log(q.filter(i => i.status === 'pending').length);
          ")
          echo "📦 剩余待发布关键词: $REMAINING"
          if [ "$REMAINING" -le 5 ] && [ -n "$FEISHU_WEBHOOK" ]; then
            if [ "$REMAINING" -eq 0 ]; then
              MSG="🚨 Mzu favicondl 关键词已耗尽！\n\n📦 剩余: 0 篇\n⛔ 明天起将无新文章发布\n\n请尽快用 SEO 工具调研新关键词，补充到 blog/queue.json"
            else
              MSG="⚠️ Mzu favicondl 关键词库存不足！\n\n📦 剩余: ${REMAINING} 篇\n⏳ 预计 ${REMAINING} 天后耗尽\n\n请提前用 SEO 工具调研新关键词，补充到 blog/queue.json"
            fi
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}" \
                 $FEISHU_WEBHOOK
            echo "📢 低库存预警已发送到飞书"
          fi

      - name: No articles to publish
        if: steps.check-queue.outputs.pending == '0'
        run: echo "⏸️ No pending keywords in queue. Add more to blog/queue.json"
